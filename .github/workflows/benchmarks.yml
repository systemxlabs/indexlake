name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to benchmark
        required: true
        type: number
      concurrency:
        description: create_index concurrency (>= 1)
        required: false
        default: "1"
        type: string
      rows:
        description: number of rows to insert
        required: false
        default: "50000"
        type: string
      batch_size:
        description: batch size for inserts
        required: false
        default: "1000"
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  bench:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request != null &&
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
        (
          startsWith(github.event.comment.body, '/bench') ||
          startsWith(github.event.comment.body, '/benchmark')
        )
      )
    steps:
      - name: Resolve PR ref and inputs
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const isDispatch = context.eventName === 'workflow_dispatch';
            const prNumber = isDispatch ? Number(core.getInput('pr_number')) : context.payload.issue.number;

            let concurrency = isDispatch ? Number(core.getInput('concurrency') || '1') : 1;
            let rows = isDispatch ? Number(core.getInput('rows') || '50000') : 50000;
            let batchSize = isDispatch ? Number(core.getInput('batch_size') || '1000') : 1000;

            if (!isDispatch) {
              const body = (context.payload.comment && context.payload.comment.body) ? context.payload.comment.body.trim() : '';
              const m = body.match(/^\/bench(?:mark)?(?:\s+(\d+))?(?:\s+rows=(\d+))?(?:\s+batch=(\d+))?/i);
              if (m) {
                if (m[1]) concurrency = Number(m[1]);
                if (m[2]) rows = Number(m[2]);
                if (m[3]) batchSize = Number(m[3]);
              }
            }

            if (!Number.isFinite(concurrency) || concurrency < 1) {
              concurrency = 1;
            }
            if (!Number.isFinite(rows) || rows < 1) {
              rows = 50000;
            }
            if (!Number.isFinite(batchSize) || batchSize < 1) {
              batchSize = 1000;
            }

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            // Safety: do not run benchmarks for forks (would execute untrusted code).
            const headRepo = pr.data.head.repo.full_name;
            const thisRepo = `${owner}/${repo}`;
            if (headRepo !== thisRepo) {
              const msg = [
                `Refusing to run benchmarks for forked PRs.`,
                ``,
                `- PR: #${prNumber}`,
                `- head repo: ${headRepo}`,
                `- expected: ${thisRepo}`,
              ].join('\n');
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: msg });
              core.setFailed(msg);
              return;
            }

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('concurrency', String(concurrency));
            core.setOutput('rows', String(rows));
            core.setOutput('batch_size', String(batchSize));

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.head_sha }}
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .

      - name: Run benchmark (release)
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p indexlake-benchmarks --bin indexlake_ci_bench --release -- \
            --concurrency "${{ steps.resolve.outputs.concurrency }}" \
            --rows "${{ steps.resolve.outputs.rows }}" \
            --batch-size "${{ steps.resolve.outputs.batch_size }}" \
            2>&1 | tee bench_output.txt
          python - << 'PY'
          import json
          from pathlib import Path

          lines = Path("bench_output.txt").read_text(encoding="utf-8", errors="replace").splitlines()
          for line in reversed(lines):
              line = line.strip()
              if not line:
                  continue
              if not (line.startswith("{") and line.endswith("}")):
                  continue
              try:
                  json.loads(line)
              except Exception:
                  continue
              Path("bench_result.json").write_text(line + "\n", encoding="utf-8")
              break
          else:
              raise SystemExit("Failed to find JSON result line in bench_output.txt")
          PY

      - name: Create comment body
        shell: bash
        env:
          BENCH_HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        run: |
          set -euo pipefail
          python - << 'PY'
          import json, os
          from pathlib import Path
          d = json.loads(Path("bench_result.json").read_text(encoding="utf-8").strip())

          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          sha = os.environ.get("BENCH_HEAD_SHA", "")

          lines = []
          lines.append("### Benchmarks")
          lines.append("")
          lines.append(f"- workflow run: {run_url}")
          lines.append(f"- ref: `{sha}`")
          lines.append("")
          lines.append("| metric | value |")
          lines.append("|---|---:|")
          for k in ["rows","batch_size","inline_row_count_limit","data_file_count","concurrency","insert_ms","index_build_ms"]:
              lines.append(f"| {k} | {d.get(k)} |")
          Path("bench_comment.md").write_text("\\n".join(lines) + "\\n", encoding="utf-8")
          PY

      - name: Comment results on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number('${{ steps.resolve.outputs.pr_number }}');
            const body = fs.readFileSync('bench_comment.md', 'utf8');
            await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
