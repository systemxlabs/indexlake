name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to benchmark
        required: true
        type: number
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  bench:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request != null &&
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
        (
          github.event.comment.body == '/bench' ||
          startsWith(github.event.comment.body, '/bench ') ||
          github.event.comment.body == '/benchmark' ||
          startsWith(github.event.comment.body, '/benchmark ')
        )
      )
    steps:
      - name: Resolve PR ref and inputs
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const isDispatch = context.eventName === 'workflow_dispatch';
            const prNumber = isDispatch ? Number(core.getInput('pr_number')) : context.payload.issue.number;

            const allowed = {
              all: ["indexlake", "indexlake_btree", "indexlake_bm25", "indexlake_hnsw", "indexlake_rabitq", "indexlake_rstar"],
              indexlake: ["indexlake"],
              indexlake_btree: ["indexlake_btree"],
              indexlake_bm25: ["indexlake_bm25"],
              indexlake_hnsw: ["indexlake_hnsw"],
              indexlake_rabitq: ["indexlake_rabitq"],
              indexlake_rstar: ["indexlake_rstar"],
            };

            let benchKey = "all";
            if (!isDispatch) {
              const body = (context.payload.comment && context.payload.comment.body) ? context.payload.comment.body.trim() : "";
              const m = body.match(/^\/(?:bench|benchmark)(?:\s+([A-Za-z0-9_:-]+))?\s*$/);
              if (!m) {
                // Should not happen due to job-level if, but keep it safe.
                core.setFailed(`Unrecognized bench command: ${body}`);
                return;
              }
              if (m[1]) benchKey = m[1];
            }

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            // Safety: do not run benchmarks for forks (would execute untrusted code).
            const headRepo = pr.data.head.repo.full_name;
            const thisRepo = `${owner}/${repo}`;
            if (headRepo !== thisRepo) {
              const msg = [
                `Refusing to run benchmarks for forked PRs.`,
                ``,
                `- PR: #${prNumber}`,
                `- head repo: ${headRepo}`,
                `- expected: ${thisRepo}`,
              ].join('\n');
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: msg });
              core.setFailed(msg);
              return;
            }

            const bins = allowed[benchKey];
            if (!bins) {
              const usage = [
                `Unknown benchmark \`${benchKey}\`.`,
                ``,
                `Usage:`,
                `- \`/bench\` (runs all benchmarks)`,
                `- \`/bench <name>\` where <name> is one of: ${Object.keys(allowed).filter(k => k !== "all").sort().join(", ")}`,
              ].join("\n");
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: usage });
              core.setFailed(usage);
              return;
            }

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('bench_bins', JSON.stringify(bins));

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .

      # ===== Run benchmark on PR branch =====
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.head_sha }}
          fetch-depth: 1
          path: pr-branch

      - name: Run benchmark on PR branch (release)
        shell: bash
        env:
          BENCH_BINS: ${{ steps.resolve.outputs.bench_bins }}
        run: |
          set -euo pipefail
          mapfile -t BINS < <(python3 - << 'PY'
          import json, os
          for b in json.loads(os.environ["BENCH_BINS"]):
              print(b)
          PY
          )

          cd pr-branch
          rm -f ../bench_output_pr_*.txt

          for b in "${BINS[@]}"; do
            echo "[PR Branch] running ${b} ..."
            set +e
            cargo run -p indexlake-benchmarks --bin "${b}" --release 2>&1 | tee "../bench_output_pr_${b}.txt"
            rc=${PIPESTATUS[0]}
            set -e
            if [ "${rc}" -ne 0 ]; then
              exit "${rc}"
            fi
          done

      # ===== Run benchmark on main branch =====
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          path: main-branch

      - name: Run benchmark on main branch (release)
        shell: bash
        env:
          BENCH_BINS: ${{ steps.resolve.outputs.bench_bins }}
        run: |
          set -euo pipefail
          mapfile -t BINS < <(python3 - << 'PY'
          import json, os
          for b in json.loads(os.environ["BENCH_BINS"]):
              print(b)
          PY
          )

          cd main-branch
          rm -f ../bench_output_main_*.txt

          for b in "${BINS[@]}"; do
            echo "[Main Branch] running ${b} ..."
            set +e
            cargo run -p indexlake-benchmarks --bin "${b}" --release 2>&1 | tee "../bench_output_main_${b}.txt"
            rc=${PIPESTATUS[0]}
            set -e
            if [ "${rc}" -ne 0 ]; then
              exit "${rc}"
            fi
          done

      - name: Upload benchmark outputs
        uses: actions/upload-artifact@v4
        with:
          name: bench-output
          path: |
            bench_output_pr_*.txt
            bench_output_main_*.txt

      # ===== Extract and compare benchmark results =====
      - name: Extract and compare benchmark results
        shell: bash
        run: |
          set -euo pipefail

          extract_bench() {
            local prefix="$1"
            local suffix="$2"
            rm -f "bench_filtered_${suffix}.txt"
            for f in bench_output_${suffix}_*.txt; do
              [ -f "$f" ] || continue
              b="${f#bench_output_${suffix}_}"
              b="${b%.txt}"
              if grep -E '^benchmark:' "$f" >/dev/null 2>&1; then
                grep -E '^benchmark:' "$f" | sed "s/^benchmark:/benchmark:[${prefix}:${b}]/" >> "bench_filtered_${suffix}.txt"
              else
                echo "benchmark:[${prefix}:${b}] (no benchmark: lines found)" >> "bench_filtered_${suffix}.txt"
              fi
            done
          }

          extract_bench "PR" "pr"
          extract_bench "main" "main"

          # Generate comparison
          {
            echo "### Benchmark Comparison (PR vs main)"
            echo ""
          } > bench_comparison.txt

          # Create a comparison table using Python
          python3 << 'PY'
          import re
          import os
          import sys

          def parse_bench_file(filepath):
              """Parse benchmark file and return dict of {test_name: time_str}"""
              results = {}
              if not os.path.exists(filepath):
                  return results
              with open(filepath, 'r') as f:
                  for line in f:
                      match = re.search(r'benchmark:\[([^\]]+)\]\s*(.+)', line)
                      if match:
                          key = match.group(1)
                          value = match.group(2).strip()
                          results[key] = value
              return results

          pr_results = parse_bench_file('bench_filtered_pr.txt')
          main_results = parse_bench_file('bench_filtered_main.txt')

          all_keys = sorted(set(pr_results.keys()) | set(main_results.keys()))

          if all_keys:
              print("| Benchmark | PR Branch | main Branch |")
              print("|-----------|-----------|-------------|")

              for key in all_keys:
                  pr_val = pr_results.get(key, "N/A")
                  main_val = main_results.get(key, "N/A")
                  print(f"| {key} | {pr_val} | {main_val} |")
          else:
              print("*No benchmark results found*")
          PY >> bench_comparison.txt

          {
            echo ""
            echo "### Raw Results"
            echo ""
            echo "**PR Branch:**"
            echo '```text'
          } >> bench_comparison.txt

          if [ -f bench_filtered_pr.txt ]; then
              cat bench_filtered_pr.txt >> bench_comparison.txt
          else
              echo "(no results)" >> bench_comparison.txt
          fi

          {
            echo '```'
            echo ""
            echo "**main Branch:**"
            echo '```text'
          } >> bench_comparison.txt

          if [ -f bench_filtered_main.txt ]; then
              cat bench_filtered_main.txt >> bench_comparison.txt
          else
              echo "(no results)" >> bench_comparison.txt
          fi

          echo '```' >> bench_comparison.txt

      - name: Comment comparison results on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number('${{ steps.resolve.outputs.pr_number }}');
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const sha = '${{ steps.resolve.outputs.head_sha }}';

            let output = fs.readFileSync('bench_comparison.txt', 'utf8');
            // Avoid breaking markdown code fences if output ever contains them.
            output = output.replaceAll('```', '``\`');

            // GitHub comment body limit is ~65536 chars; keep margin for headers.
            const maxLen = 60000;
            let truncated = false;
            if (output.length > maxLen) {
              output = output.slice(0, maxLen) + "\n\n...(truncated, see artifact `bench-output` for full output)\n";
              truncated = true;
            }

            const body = [
              output,
              "",
              `---`,
              `- workflow run: ${runUrl}`,
              `- PR ref: \`${sha}\``,
              truncated ? "- note: output truncated due to comment size limits" : "",
            ].filter(Boolean).join("\n");

            await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
