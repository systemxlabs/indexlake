name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to benchmark
        required: true
        type: number
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  bench:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request != null &&
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
        (
          github.event.comment.body == '/bench' ||
          github.event.comment.body == '/benchmark'
        )
      )
    steps:
      - name: Resolve PR ref and inputs
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const isDispatch = context.eventName === 'workflow_dispatch';
            const prNumber = isDispatch ? Number(core.getInput('pr_number')) : context.payload.issue.number;

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            // Safety: do not run benchmarks for forks (would execute untrusted code).
            const headRepo = pr.data.head.repo.full_name;
            const thisRepo = `${owner}/${repo}`;
            if (headRepo !== thisRepo) {
              const msg = [
                `Refusing to run benchmarks for forked PRs.`,
                ``,
                `- PR: #${prNumber}`,
                `- head repo: ${headRepo}`,
                `- expected: ${thisRepo}`,
              ].join('\n');
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: msg });
              core.setFailed(msg);
              return;
            }

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('head_ref', pr.data.head.ref);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.head_sha }}
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .

      - name: Run benchmark (release)
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p indexlake-benchmarks --bin indexlake_btree --release -- --ci 2>&1 | tee bench_output.txt
          python - << 'PY'
          import json
          from pathlib import Path

          lines = Path("bench_output.txt").read_text(encoding="utf-8", errors="replace").splitlines()
          for line in reversed(lines):
              line = line.strip()
              if not line:
                  continue
              if not (line.startswith("{") and line.endswith("}")):
                  continue
              try:
                  json.loads(line)
              except Exception:
                  continue
              Path("bench_result.json").write_text(line + "\n", encoding="utf-8")
              break
          else:
              raise SystemExit("Failed to find JSON result line in bench_output.txt")
          PY

      - name: Create comment body
        shell: bash
        env:
          BENCH_HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        run: |
          set -euo pipefail
          python - << 'PY'
          import json, os
          from pathlib import Path
          d = json.loads(Path("bench_result.json").read_text(encoding="utf-8").strip())

          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          sha = os.environ.get("BENCH_HEAD_SHA", "")

          lines = []
          lines.append("### Benchmarks")
          lines.append("")
          lines.append(f"- workflow run: {run_url}")
          lines.append(f"- ref: `{sha}`")
          lines.append("")
          lines.append("| metric | value |")
          lines.append("|---|---:|")
          for k in ["rows","batch_size","inline_row_count_limit","data_file_count","concurrency","insert_ms","index_build_ms"]:
              lines.append(f"| {k} | {d.get(k)} |")
          Path("bench_comment.md").write_text("\\n".join(lines) + "\\n", encoding="utf-8")
          PY

      - name: Comment results on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number('${{ steps.resolve.outputs.pr_number }}');
            const body = fs.readFileSync('bench_comment.md', 'utf8');
            await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
